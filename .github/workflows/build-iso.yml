name: Build Bootable ISO

# ── Cuándo corre ───────────────────────────────────────────────────────────────
on:
  # Disparo manual desde la pestaña Actions en GitHub.com (botón "Run workflow")
  workflow_dispatch:

  # También auto-dispara al crear un tag  v*  (ej: git tag v1.0 && git push --tags)
  push:
    tags:
      - 'v*'

# ── Job principal ──────────────────────────────────────────────────────────────
jobs:
  build-iso:
    name: Build REBINCOOP Secure Erase ISO
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write            # Necesario para crear Releases

    steps:

      # 1. Descarga el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Instala herramientas del sistema en el runner Ubuntu
      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xorriso \
            wget \
            python3 \
            python3-pip \
            mtools \
            dosfstools \
            syslinux-utils \
            ca-certificates

      # 3. Pre-descarga wheels de Python que irán en el ISO
      - name: Pre-descargar wheels de Python
        run: |
          mkdir -p /tmp/wheels
          pip3 download \
            --dest /tmp/wheels \
            --no-deps \
            --prefer-binary \
            --break-system-packages \
            fastapi \
            uvicorn \
            websockets \
            fpdf2 \
            python-multipart \
            anyio \
            starlette \
            click \
            h11 \
            idna \
            sniffio \
            exceptiongroup \
            typing_extensions
          echo "Wheels descargados: $(ls /tmp/wheels | wc -l)"

      # 4. Copia los archivos Python de la app al directorio que espera el build script
      - name: Preparar archivos de la app
        run: |
          mkdir -p bootable/app
          for f in main.py disk_manager.py erase_engine.py \
                   pdf_generator.py system_info.py index.html; do
            [ -f "$f" ] && cp "$f" bootable/app/ && echo "  → $f copiado"
          done

      # 5. Ejecuta el build script directamente en el runner (sin Docker)
      - name: Generar ISO
        run: |
          mkdir -p dist
          export DIST_DIR="${GITHUB_WORKSPACE}/dist"
          export WHEELS_DIR=/tmp/wheels
          export BUILD_DIR="${GITHUB_WORKSPACE}/bootable"
          bash bootable/scripts/build-iso.sh

      # 6. Muestra info del ISO generado
      - name: Info del ISO
        run: |
          echo "=== ISO generada ==="
          ls -lh dist/
          echo ""
          echo "SHA-256:"
          cat dist/rebincoop-secure-erase.iso.sha256 2>/dev/null || \
            sha256sum dist/rebincoop-secure-erase.iso

      # 7. Sube el ISO como artefacto descargable (disponible 30 días)
      - name: Subir ISO como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: rebincoop-secure-erase-iso
          path: |
            dist/rebincoop-secure-erase.iso
            dist/rebincoop-secure-erase.iso.sha256
          retention-days: 30

      # 8. Si se disparó por un tag (v1.0, v2.0...) → crea un Release de GitHub
      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: REBINCOOP Secure Erase ${{ github.ref_name }}
          body: |
            ## REBINCOOP Secure Erase — ISO Booteable ${{ github.ref_name }}

            ### Descargar
            Haz clic en `rebincoop-secure-erase.iso` abajo (~700 MB).

            ### Flashear al USB
            **Windows:** Rufus → selecciona el ISO → modo **DD Image** → Start
            **Linux:** `sudo dd if=rebincoop-secure-erase.iso of=/dev/sdX bs=4M status=progress oflag=sync`

            ### Requisitos
            - USB de 2 GB o más
            - PC x86_64 con BIOS o UEFI (Secure Boot **desactivado**)
            - El sistema arranca en ~60 segundos

            ### Integridad
            Verifica con el archivo `.sha256` adjunto.
          files: |
            dist/rebincoop-secure-erase.iso
            dist/rebincoop-secure-erase.iso.sha256
          draft: false
          prerelease: false
