name: Build Bootable ISO

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Descargar paquetes APK y wheels Python dentro de un contenedor Alpine.
#          Así evitamos Docker-in-Docker y el rate-limit de Docker Hub.
# JOB 2 — Construir el ISO en ubuntu-latest usando los paquetes del job 1.
# ══════════════════════════════════════════════════════════════════════════════

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  fetch-packages:
    name: Descargar paquetes (Alpine container)
    runs-on: ubuntu-latest
    container:
      image: alpine:3.19        # ← el runner corre DENTRO de Alpine

    steps:
      - name: Configurar repos y herramientas base
        run: |
          printf '%s\n' \
            'https://dl-cdn.alpinelinux.org/alpine/v3.19/main' \
            'https://dl-cdn.alpinelinux.org/alpine/v3.19/community' \
            > /etc/apk/repositories
          apk update -q
          apk add --no-cache python3 py3-pip

      - name: Descargar paquetes APK con dependencias
        run: |
          mkdir -p /tmp/apkcache
          apk fetch -q --recursive --output /tmp/apkcache \
            python3 py3-pip \
            smartmontools hdparm nvme-cli \
            util-linux lsblk pciutils usbutils dmidecode \
            e2fsprogs dosfstools \
            chromium \
            xorg-server \
            xf86-video-fbdev xf86-video-vesa xf86-video-modesetting \
            xf86-input-libinput \
            xinit openbox dbus dbus-openrc \
            mesa-dri-gallium font-dejavu \
            shadow bash libxrandr xrandr
          echo "APK descargados: $(ls /tmp/apkcache/*.apk | wc -l)"

      - name: Generar APKINDEX (índice local sin firma)
        run: |
          cd /tmp/apkcache
          apk index --no-warnings \
            --output APKINDEX.tar.gz \
            *.apk
          echo "APKINDEX generado: $(du -sh APKINDEX.tar.gz)"

      - name: Descargar wheels Python offline
        run: |
          mkdir -p /tmp/wheels
          pip3 download \
            --dest /tmp/wheels \
            --no-deps \
            --prefer-binary \
            fastapi uvicorn websockets fpdf2 python-multipart \
            anyio starlette click h11 idna sniffio \
            exceptiongroup typing_extensions
          echo "Wheels: $(ls /tmp/wheels | wc -l)"

      - name: Subir caché APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: apk-cache
          path: /tmp/apkcache/
          retention-days: 1

      - name: Subir wheels Python como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: /tmp/wheels/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  build-iso:
    name: Build REBINCOOP Secure Erase ISO
    runs-on: ubuntu-latest
    needs: fetch-packages          # espera a que job 1 termine
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar herramientas del sistema
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xorriso wget mtools dosfstools syslinux-utils ca-certificates

      - name: Descargar caché APK
        uses: actions/download-artifact@v4
        with:
          name: apk-cache
          path: /tmp/apkcache

      - name: Descargar wheels Python
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: /tmp/wheels

      - name: Verificar paquetes descargados
        run: |
          echo "APK: $(ls /tmp/apkcache/*.apk 2>/dev/null | wc -l) paquetes"
          echo "Wheels: $(ls /tmp/wheels/*.whl 2>/dev/null | wc -l) wheels"

      - name: Preparar archivos de la app
        run: |
          mkdir -p bootable/app
          for f in main.py disk_manager.py erase_engine.py \
                   pdf_generator.py system_info.py index.html; do
            [ -f "$f" ] && cp "$f" bootable/app/ && echo "  → $f"
          done

      - name: Generar ISO
        run: |
          mkdir -p dist
          export DIST_DIR="${GITHUB_WORKSPACE}/dist"
          export WHEELS_DIR=/tmp/wheels
          export BUILD_DIR="${GITHUB_WORKSPACE}/bootable"
          export APKCACHE_DIR=/tmp/apkcache
          bash bootable/scripts/build-iso.sh

      - name: Info del ISO
        run: |
          echo "=== ISO generada ==="
          ls -lh dist/
          sha256sum dist/rebincoop-secure-erase.iso | tee dist/rebincoop-secure-erase.iso.sha256

      - name: Subir ISO como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: rebincoop-secure-erase-iso
          path: |
            dist/rebincoop-secure-erase.iso
            dist/rebincoop-secure-erase.iso.sha256
          retention-days: 30

      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: REBINCOOP Secure Erase ${{ github.ref_name }}
          body: |
            ## REBINCOOP Secure Erase ${{ github.ref_name }} — ISO 100% Offline

            **Sin internet requerido** — paquetes APK y wheels Python incluidos.

            ### USB (Windows)
            Rufus → modo **DD Image** → Start

            ### PXE (red local)
            Extraer `vmlinuz-lts`, `initramfs-lts`, `modloop-lts` y
            `rebincoop.apkovl.tar.gz` del ISO y servir desde el servidor PXE/HTTP.
            Kernel params: `apkovl=rebincoop alpine_dev=<ip_servidor>`

            ### Requisitos
            - x86_64, BIOS o UEFI (Secure Boot **desactivado**)
          files: |
            dist/rebincoop-secure-erase.iso
            dist/rebincoop-secure-erase.iso.sha256
          draft: false
          prerelease: false
