# /etc/X11/xorg.conf.d/10-screen.conf
# Minimal X11 configuration for REBINCOOP kiosk.
# Driver priority: modesetting (KMS) → fbdev → vesa

Section "ServerFlags"
    Option "DontZap"        "true"   # Disable Ctrl+Alt+Backspace (kiosk hardening)
    Option "DontVTSwitch"   "true"   # Disable Ctrl+Alt+Fn VT switching
    Option "BlankTime"      "0"      # No screen blanking
    Option "StandbyTime"    "0"
    Option "SuspendTime"    "0"
    Option "OffTime"        "0"
EndSection

Section "ServerLayout"
    Identifier "KioskLayout"
    Screen     0 "Screen0"
    InputDevice "Keyboard0" "CoreKeyboard"
    InputDevice "Mouse0"    "CorePointer"
EndSection

Section "InputDevice"
    Identifier "Keyboard0"
    Driver     "libinput"
    Option     "XkbLayout"  "es"
    Option     "XkbOptions" ""
EndSection

Section "InputDevice"
    Identifier "Mouse0"
    Driver     "libinput"
    Option     "AccelProfile" "flat"
EndSection

Section "Device"
    Identifier "Card0"
    # 'modesetting' works for Intel, AMD, newer NVIDIA (nouveau).
    # Xorg will auto-detect; list modesetting first so it's preferred.
    Driver     "modesetting"
    Option     "AccelMethod"  "glamor"
    Option     "DRI"          "3"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device     "Card0"
    DefaultDepth 24
    SubSection "Display"
        Depth  24
        # Try fullHD first, fall back gracefully
        Modes  "1920x1080" "1680x1050" "1366x768" "1280x720" "1024x768"
    EndSubSection
EndSection
